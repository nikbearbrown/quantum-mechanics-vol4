  <text x="156" y="389" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Pure dephasing (T&#x2082; finite)</text>
  <!-- Legend item 2 -->
  <line x1="310" y1="385" x2="340" y2="385" stroke="#787878" stroke-width="1.5" stroke-dasharray="4 2.5"/>
  <text x="346" y="389" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Pure relaxation (T&#x2081; finite)</text>
  <!-- Legend item 3 -->
  <line x1="498" y1="382" x2="510" y2="382" stroke="#C8102E" stroke-width="1.5" stroke-dasharray="4 2.5"/>
  <text x="516" y="389" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">Combined</text>

