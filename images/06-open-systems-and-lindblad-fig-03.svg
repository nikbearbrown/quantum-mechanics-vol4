  <defs>
    <marker id="arrow-03" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2a1a0e"/>
    </marker>
    <marker id="arrow-red-03" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
