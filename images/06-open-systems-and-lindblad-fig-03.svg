  <title id="fig-title-03">Bloch Vector Dynamics — Three Decoherence Regimes</title>
  <desc>Three side-by-side Bloch sphere panels showing pure dephasing (spiral to equatorial center), pure relaxation (vertical decay to south pole), and combined dephasing plus relaxation (spiral to south pole).</desc>
  <metadata>
    <cajal:figure xmlns:cajal="https://bearbrown.ai/cajal/1.0"
      book="Quantum Mechanics — Information, Measurement, and Open Systems"
      book-slug="quantum-mechanics-vol4"
