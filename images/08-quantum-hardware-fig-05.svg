  <desc>Left panel shows a Bloch sphere with two decay arrows: energy relaxation (T1) toward the south pole and pure dephasing (T-phi) spiraling inward toward the equator. Right panel shows the timescale hierarchy bar showing T1 greater than or equal to T2, and T2 greater than T2-star.</desc>
