  <circle cx="217" cy="205" r="120" fill="none" stroke="#D4D4D4" stroke-width="1"/>
  <!-- Equatorial ellipse -->
  <ellipse cx="217" cy="205" rx="120" ry="30" fill="none" stroke="#D4D4D4" stroke-width="0.75" stroke-dasharray="3 3"/>
  <!-- Polar axis -->
  <line x1="217" y1="85" x2="217" y2="325" stroke="#D4D4D4" stroke-width="0.75"/>
  <!-- North pole label: |1> excited -->
  <text x="223" y="83" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="10" fill="#545454">|1&#x27E9;</text>
