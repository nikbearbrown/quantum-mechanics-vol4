  <rect x="430" y="226" width="74" height="28" fill="#787878"/>
  <text x="424" y="244" text-anchor="end" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#787878">T&#x2082;*</text>

  <!-- Inequality markers -->
