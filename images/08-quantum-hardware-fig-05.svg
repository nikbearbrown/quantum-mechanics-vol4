  <path d="M 282,155 C 280,200 260,270 220,320" fill="none" stroke="#2a1a0e" stroke-width="2" marker-end="url(#arrow-blue-05)"/>
  <text x="310" y="230" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">T&#x2081; decay</text>
