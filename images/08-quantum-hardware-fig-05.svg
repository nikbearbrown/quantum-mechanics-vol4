  <rect x="46" y="340" width="340" height="50" fill="#FFFFFF" stroke="#D4D4D4" stroke-width="0.75"/>
  <text x="216" y="358" text-anchor="middle" font-family="'JetBrains Mono','Fira Code','Courier New',monospace" font-size="11" fill="#2a1a0e">1/T&#x2082; = 1/(2T&#x2081;) + 1/T&#x03c6;</text>
  <text x="216" y="378" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">T&#x2082; &#x2264; 2T&#x2081; — natural linewidth limit when T&#x03c6; = &#x221e;</text>

