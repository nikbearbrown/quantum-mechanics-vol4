  <line x1="504" y1="188" x2="504" y2="223" stroke="#545454" stroke-width="0.75"/>
  <text x="511" y="210" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">T&#x2082; &#x2265; T&#x2082;*</text>

