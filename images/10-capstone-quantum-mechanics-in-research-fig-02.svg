  <text x="350" y="106" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF">2. Locate the central quantitative claim</text>
  <text x="350" y="121" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#D4D4D4">abstract + figure captions</text>
