  <title id="fig-title-10-02">Paper-Reading Triage Framework — Seven-Step Flowchart</title>
  <desc>Vertical seven-step flowchart. Steps 1-4 in dark ink nodes represent information-gathering: identify problem class, locate central claim, identify Hamiltonian, identify observable. Steps 5-7 in red outline nodes represent verification: check against theory, assess statistical strength, read honesty disclaimer. A decision diamond after step 5 branches to continue (downward) or loop back to step 3 (disagreement path).</desc>
