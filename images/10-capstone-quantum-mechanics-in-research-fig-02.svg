  <rect x="210" y="360" width="280" height="30" fill="#FFFFFF" stroke="#2a1a0e" stroke-width="1.5"/>
  <text x="350" y="373" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#2a1a0e">6. Assess statistical strength</text>
  <text x="350" y="386" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">sample size, error bars, significance</text>

