  <line x1="350" y1="390" x2="350" y2="402" stroke="#2a1a0e" stroke-width="1" marker-end="url(#arrow-10-02)"/>

  <!-- Step 7: y=404 (truncated for space, shown as continuation) -->
  <text x="350" y="414" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="10" fill="#545454">7. &#x2193; Read honesty disclaimer — caveats, acknowledged limitations</text>

