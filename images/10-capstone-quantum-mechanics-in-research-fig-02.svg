  <rect x="210" y="145" width="280" height="38" fill="#2a1a0e" stroke="none"/>
  <text x="350" y="161" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="11" fill="#FFFFFF">3. Identify system Hamiltonian</text>
  <text x="350" y="176" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#D4D4D4">what degrees of freedom, what couplings?</text>
