  <desc>Upper sub-panel shows a unit circle with four measurement axis arrows: Alice solid and dashed at 0 and 90 degrees, Bob solid and dashed at 45 and minus 45 degrees. Lower sub-panel shows four bars representing the CHSH correlators E(A1B1), E(A1B2), E(A2B1), E(A2B2) with values plus and minus 1 over root 2. A secondary scale marker shows S total equals 2 root 2 exceeding the classical bound of 2.</desc>
