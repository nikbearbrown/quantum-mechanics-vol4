  <title id="fig-title-10-04">NV-Center ODMR — Ground-State Spin-1 Levels and Zeeman-Split Fluorescence Dips</title>
  <desc>Left panel shows spin-1 ground-state energy levels. At zero field, m_s equal plus-one and minus-one are degenerate above m_s zero by D equals 2.87 GHz. At nonzero B field, the degeneracy lifts by 2 gamma B with two separate levels. Qubit subspace bracket highlights the m_s zero and m_s minus-one transition. Right panel shows two symmetric downward Lorentzian fluorescence dips at the two ESR transition frequencies, separated by 2 gamma B.</desc>
