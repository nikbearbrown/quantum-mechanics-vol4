  <!-- Curves: pL = A*(p/p_th)^exponent, A=0.1, p_th=0.01
       d=3: exp=2; d=5: exp=3; d=7: exp=4
       For each p: log(pL) = log(0.1) + exp*(log(p)-log(0.01))
                            = -1 + exp*(log(p)+2)
       Below threshold (p&lt;0.01): d=7 lowest; above threshold: d=7 highest -->

  <!-- d=3 curve (Orange #C8860E): key points
       p=10^-4: log(pL)=-1+2*(-4+2)=-1+2*(-2)=-5 → y=318-((−5+20)/20)*280=318-(15/20)*280=318-210=108
       p=10^-3: log(pL)=-1+2*(-3+2)=-1-2=-3 → y=318-((17)/20)*280=80
       p=0.01: log(pL)=-1 → y=318-((19)/20)*280=318-266=52
       p=5e-2: log(pL)=-1+2*(log(0.05)+2)=-1+2*(-1.301+2)=-1+2*0.699=-1+1.398=0.398 → clamped to 0 → y=38 (near top)
       But log(pL)=0.398 > 0 so pL>1, clamp to 1 → y=38 -->

  <!-- d=3 polyline: connecting key calculated points -->
  <!-- p=10^-4 → (80,108); p=3e-4 → (169,93.5); p=10^-3 → (265,80); p=3e-3 → (354,64); p=10^-2 → (451,52); p=5e-2 → (580,38) -->
  <!-- Wait, for d=3 below threshold pL decreases as p increases. Let me recalculate:
       Below threshold pL = 0.1*(p/0.01)^2 — increases with p (higher p → more logical errors even below threshold)
       So ALL curves increase from left to right, but the ordering reverses at threshold:
       Below threshold (p<p_th): smaller d → larger pL (d=3 worst, d=7 best below threshold)
       Above threshold (p>p_th): larger d → larger pL (d=3 best, d=7 worst above threshold)
       At threshold: all meet at same point pL = 0.1 -->

  <!-- Corrected d=3 (exp=2):
       p=10^-4: pL = 0.1*(10^-4/0.01)^2 = 0.1*(10^-2)^2 = 0.1*10^-4 = 10^-5 → log=-5 → y=108
       p=10^-3: pL = 0.1*(10^-3/0.01)^2 = 0.1*(10^-1)^2 = 0.1*10^-2 = 10^-3 → log=-3 → y=80
       p=0.01: pL = 0.1*(1)^2 = 0.1 → log=-1 → y=318-((19/20)*280)=318-266=52
       p=0.05: pL = 0.1*(5)^2 = 2.5 → clamp to 1 → y=38 -->
