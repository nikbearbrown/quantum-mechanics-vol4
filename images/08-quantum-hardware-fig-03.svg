  <text x="508" y="385" text-anchor="middle" font-family="'Inter',-apple-system,'Helvetica Neue',sans-serif" font-size="9" fill="#545454">Qubit: {m&#x209b;=0, m&#x209b;=&#x2212;1} — microwave addressable</text>

